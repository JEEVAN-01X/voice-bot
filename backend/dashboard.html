<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automaton AI — Order Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #00e5a0;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --en: #3b82f6;
    --hi: #f97316;
    --kn: #22c55e;
    --mr: #a855f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .live-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    color: var(--green);
    font-weight: 500;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    background: var(--surface);
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    transition: all 0.3s;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stat.total .stat-num { color: var(--accent); }
  .stat.en .stat-num { color: var(--en); }
  .stat.hi .stat-num { color: var(--hi); }
  .stat.kn .stat-num { color: var(--kn); }
  .stat.mr .stat-num { color: var(--mr); }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .filter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
  }

  .filter-btn {
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Space Mono', monospace;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .filter-btn.en.active { background: var(--en); border-color: var(--en); }
  .filter-btn.hi.active { background: var(--hi); border-color: var(--hi); }
  .filter-btn.kn.active { background: var(--kn); border-color: var(--kn); }
  .filter-btn.mr.active { background: var(--mr); border-color: var(--mr); }

  /* ── MAIN CONTENT ── */
  .main {
    padding: 24px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .order-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* ── ORDER GRID ── */
  .order-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* ── ORDER CARD ── */
  .order-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: all 0.3s;
    animation: slideIn 0.4s ease-out;
    position: relative;
    overflow: hidden;
  }

  .order-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }

  .order-card.en::before { background: var(--en); }
  .order-card.hi::before { background: var(--hi); }
  .order-card.kn::before { background: var(--kn); }
  .order-card.mr::before { background: var(--mr); }

  .order-card:hover {
    border-color: #2e2e4e;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .lang-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 0.05em;
  }

  .lang-badge.en { background: rgba(59,130,246,0.15); color: var(--en); }
  .lang-badge.hi { background: rgba(249,115,22,0.15); color: var(--hi); }
  .lang-badge.kn { background: rgba(34,197,94,0.15); color: var(--kn); }
  .lang-badge.mr { background: rgba(168,85,247,0.15); color: var(--mr); }

  .order-time {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .order-phone {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .order-phone::before {
    content: '📞';
    font-size: 12px;
  }

  .items-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .item-tag {
    background: rgba(108,99,255,0.1);
    border: 1px solid rgba(108,99,255,0.2);
    color: #a8a3ff;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
  }

  .order-address {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .status-confirmed {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    color: var(--green);
    font-family: 'Space Mono', monospace;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .order-id {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-title {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .empty-sub {
    font-size: 13px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ── CALL BUTTON ── */
  .call-section {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .call-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .call-input:focus { border-color: var(--accent); }

  .call-btn {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .call-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .call-btn:active { transform: translateY(0); }
  .call-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .call-hint {
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo-text">AUTOMATON AI</div>
      <div class="logo-sub">Order Dashboard</div>
    </div>
  </div>
  <div class="live-pill">
    <div class="live-dot"></div>
    LIVE
  </div>
</header>

<div class="stats-bar">
  <div class="stat total">
    <div class="stat-num" id="count-total">0</div>
    <div class="stat-label">Total Orders</div>
  </div>
  <div class="stat en">
    <div class="stat-num" id="count-en">0</div>
    <div class="stat-label">English</div>
  </div>
  <div class="stat hi">
    <div class="stat-num" id="count-hi">0</div>
    <div class="stat-label">Hindi</div>
  </div>
  <div class="stat kn">
    <div class="stat-num" id="count-kn">0</div>
    <div class="stat-label">Kannada</div>
  </div>
  <div class="stat mr">
    <div class="stat-num" id="count-mr">0</div>
    <div class="stat-label">Marathi</div>
  </div>
</div>

<div class="call-section">
  <input class="call-input" type="text" id="phone-input" placeholder="+916361791391" value="+916361791391">
  <button class="call-btn" id="call-btn" onclick="triggerCall()">📞 Trigger Call</button>
  <span class="call-hint">Initiates outbound call via Twilio</span>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn en" onclick="setFilter('en-IN', this)">EN</button>
  <button class="filter-btn hi" onclick="setFilter('hi-IN', this)">HI</button>
  <button class="filter-btn kn" onclick="setFilter('kn-IN', this)">KN</button>
  <button class="filter-btn mr" onclick="setFilter('mr-IN', this)">MR</button>
</div>

<div class="main">
  <div class="section-header">
    <div class="section-title">Confirmed Orders</div>
    <div class="order-count" id="order-count">Loading...</div>
  </div>
  <div class="order-grid" id="order-grid"></div>
</div>

<div id="toast">✓ New order received!</div>

<script>
  // ── CONFIG: change this if your backend runs on a different port ──
  const API_BASE = 'http://localhost:8000';

  let currentFilter = 'all';
  let allOrders = [];
  let knownIds = new Set();

  const LANG_NAMES = { 'en-IN': 'EN', 'hi-IN': 'HI', 'kn-IN': 'KN', 'mr-IN': 'MR' };
  const LANG_KEYS  = { 'en-IN': 'en', 'hi-IN': 'hi', 'kn-IN': 'kn', 'mr-IN': 'mr' };

  function setFilter(lang, btn) {
    currentFilter = lang;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  function formatTime(isoStr) {
    if (!isoStr) return '—';
    try {
      const d = new Date(isoStr);
      return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch { return '—'; }
  }

  function renderCard(order) {
    const langKey = LANG_KEYS[order.language] || 'en';
    const langLabel = LANG_NAMES[order.language] || 'EN';
    const items = Array.isArray(order.items) ? order.items : [];
    const itemTags = items.map(i => `<span class="item-tag">${i}</span>`).join('');
    const address = order.address
      ? `<div class="order-address">📍 ${order.address}</div>` : '';

    return `
      <div class="order-card ${langKey}" data-id="${order.id}">
        <div class="card-top">
          <span class="lang-badge ${langKey}">${langLabel}</span>
          <span class="order-time">${formatTime(order.confirmed_at)}</span>
        </div>
        <div class="order-phone">${order.customer_phone || 'Unknown'}</div>
        <div class="items-list">${itemTags || '<span class="item-tag" style="color:var(--muted)">No items</span>'}</div>
        ${address}
        <div class="card-footer">
          <div class="status-confirmed">
            <div class="status-dot"></div>CONFIRMED
          </div>
          <div class="order-id">#${order.id?.slice(0,8) || '—'}</div>
        </div>
      </div>
    `;
  }

  function renderOrders() {
    const grid = document.getElementById('order-grid');
    const filtered = currentFilter === 'all'
      ? allOrders
      : allOrders.filter(o => o.language === currentFilter);

    document.getElementById('order-count').textContent =
      `${filtered.length} order${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-title">No orders yet</div>
          <div class="empty-sub">Orders appear here in real-time as calls come in</div>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(renderCard).join('');
  }

  function updateStats(orders) {
    document.getElementById('count-total').textContent = orders.length;
    document.getElementById('count-en').textContent = orders.filter(o => o.language === 'en-IN').length;
    document.getElementById('count-hi').textContent = orders.filter(o => o.language === 'hi-IN').length;
    document.getElementById('count-kn').textContent = orders.filter(o => o.language === 'kn-IN').length;
    document.getElementById('count-mr').textContent = orders.filter(o => o.language === 'mr-IN').length;
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  async function fetchOrders() {
    try {
      const res = await fetch(`${API_BASE}/orders`);
      if (!res.ok) return;
      const orders = await res.json();

      // Detect new orders
      let hasNew = false;
      orders.forEach(o => {
        if (!knownIds.has(o.id)) {
          knownIds.add(o.id);
          if (knownIds.size > 1) hasNew = true; // skip first load toast
        }
      });

      if (hasNew) showToast();
      allOrders = orders;
      updateStats(orders);
      renderOrders();
    } catch (err) {
      console.error('Fetch error:', err);
      document.getElementById('order-count').textContent = 'Backend offline';
    }
  }

  async function triggerCall() {
    const phone = document.getElementById('phone-input').value.trim();
    if (!phone) return alert('Enter a phone number');
    const btn = document.getElementById('call-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Calling...';
    try {
      const res = await fetch(`${API_BASE}/make-call?to=${encodeURIComponent(phone)}`, { method: 'POST' });
      const data = await res.json();
      btn.textContent = '✅ Called!';
      setTimeout(() => { btn.textContent = '📞 Trigger Call'; btn.disabled = false; }, 3000);
    } catch (err) {
      alert('Call failed — is backend running?');
      btn.textContent = '📞 Trigger Call';
      btn.disabled = false;
    }
  }

  // Poll every 3 seconds
  fetchOrders();
  setInterval(fetchOrders, 3000);
</script>
</body>
</html>
